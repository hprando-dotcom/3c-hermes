services:
  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrator:
    build:
      context: .
    container_name: hermes-migrator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
    container_name: hermes-api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${HERMES_API_PORT:-8000}:8000"
    command:
      [
        "uvicorn",
        "hermes.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
    container_name: hermes-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    command: ["python", "-m", "hermes.scheduler.worker"]
    restart: unless-stopped

volumes:
  postgres_data:

